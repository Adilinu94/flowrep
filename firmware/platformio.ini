; PlatformIO project config for the FlowRep firmware (M5StickC Plus2).
; NOT hardware-verified: written before the board arrived, see the
; accompanying commit note and docs/GYM_TRACKER_ARCHITEKTUR.md Phase 0.
; First thing to run once the board is available: `pio run -t upload`.
;
; board = m5stick-c is used as the closest available PlatformIO board
; definition; verify against the actual M5StickCPlus2 library examples
; once the toolchain is installed, since board IDs occasionally change
; between PlatformIO platform-espressif32 releases.

[env:m5stick-c-plus2]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200

lib_deps =
    m5stack/M5StickCPlus2@^1.0.0

build_flags =
    -D CORE_DEBUG_LEVEL=3
