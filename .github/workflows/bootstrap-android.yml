name: Bootstrap Android folder (one-off)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate platform folders
        run: flutter create . --project-name flowrep --org com.flowrep --platforms android,web

      - name: Patch AndroidManifest.xml with required BLE permissions
        run: python3 ../tools/patch_android_manifest.py

      - name: Show resulting manifest for verification
        run: cat android/app/src/main/AndroidManifest.xml

      - name: Commit generated + patched platform folders
        run: |
          cd ..
          git config user.email "ci@flowrep.local"
          git config user.name "Bootstrap Android (auto)"
          sed -i '/^app\/android\//d' .gitignore
          git add app/android .gitignore
          git commit -m "Bootstrap android/ folder with BLE permissions patched in (see docs/06_SETUP_ANLEITUNG.md, ADR-007, ADR-008)"
          git push
