name: App CI

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate missing platform folders
        run: flutter create . --project-name flowrep --org com.flowrep --platforms android,web 2>&1 | tee ../ci-log.txt

      - name: Install dependencies
        run: flutter pub get 2>&1 | tee -a ../ci-log.txt

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs 2>&1 | tee -a ../ci-log.txt

      - name: Static analysis
        run: flutter analyze 2>&1 | tee -a ../ci-log.txt

      - name: Run unit tests
        run: flutter test 2>&1 | tee -a ../ci-log.txt

      - name: Report log back into repo on failure
        if: failure()
        run: |
          cd ..
          mkdir -p ci-logs
          cp ci-log.txt ci-logs/app-ci-latest.txt
          git config user.email "ci@flowrep.local"
          git config user.name "App CI (auto)"
          git add ci-logs/app-ci-latest.txt
          git commit -m "CI: app build log (failure) [skip ci]" || true
          git push || true
