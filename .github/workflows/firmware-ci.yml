name: Firmware CI

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install -U platformio 2>&1 | tee ../ci-log.txt

      - name: List available M5Stack board definitions (diagnostic)
        run: (pio boards espressif32 2>&1 | grep -i "m5stick\|m5stack") | tee -a ../ci-log.txt || echo "No M5 boards matched" | tee -a ../ci-log.txt

      - name: Build firmware
        run: pio run 2>&1 | tee -a ../ci-log.txt

      - name: Report log back into repo on failure
        if: failure()
        run: |
          cd ..
          mkdir -p ci-logs
          cp ci-log.txt ci-logs/firmware-ci-latest.txt
          git config user.email "ci@flowrep.local"
          git config user.name "Firmware CI (auto)"
          git add ci-logs/firmware-ci-latest.txt
          git commit -m "CI: firmware build log (failure) [skip ci]" || true
          git push || true
