name: flowrep
description: >
  FlowRep - BLE/IMU-basiertes automatisches Wiederholungszaehlen fuer
  Krafttraining. Siehe docs/reference/GYM_TRACKER_ARCHITEKTUR.md fuer die vollstaendige
  Architekturdokumentation.
publish_to: 'none'
version: 1.0.0-rc.1+1

environment:
  sdk: '>=3.4.0 <4.0.0'

# Enables SQLite3MultipleCiphers (encryption support for the sqlite3
# package drift builds on) instead of vanilla SQLite. Added 2026-07-19 for
# local-database encryption (GYM_TRACKER_ARCHITEKTUR.md §5.2.3) - see
# drift_database.dart's header comment for why this replaced the
# originally-planned sqlcipher_flutter_libs (now deprecated). Requires
# drift >=2.32.0 (see dependencies below) and, per Drift's own docs, a
# sufficiently recent Dart SDK/toolchain to resolve build hooks - NOT
# independently verified in this sandbox (no real `flutter pub get`/build
# available here; see drift_database.dart header for the full caveat).
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

dependencies:
  flutter:
    sdk: flutter
  # BLE - final choice, siehe ADR-002. functional with read()-polling at 28 Hz.
  # Notifications confirmed working on HyperOS (nRF Connect test) but
  # flutter_blue_plus v1 doesn't deliver them. read()-polling is the
  # viable workaround.
  flutter_blue_plus: ^2.3.10

  # DB - finale Wahl Drift statt Isar, siehe ADR-006.
  # 2.20.0 -> ^2.32.0 (2026-07-19): minimum version for SQLite3MultipleCiphers
  # encryption support (see hooks: above and drift_database.dart).
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.24
  # Added 2026-07-19: drift_database.dart's migration path opens the
  # pre-existing plaintext database directly (VACUUM INTO + PRAGMA rekey)
  # before drift itself is involved - needs the sqlite3 API directly, not
  # just transitively through drift.
  # 2.4.0 -> ^3.4.0 (2026-07-19, real `flutter pub get` via Desktop
  # Commander): drift ^2.32.0 transitively requires sqlite3 ^3.1.5+;
  # ^2.4.0 as originally written could never resolve. Confirmed drift's
  # own sqlite3 constraint is satisfied by 3.4.0 (pub's own suggested
  # fix). See git history for the pre-verification version.
  sqlite3: ^3.4.0
  path_provider: ^2.1.4
  path: ^1.9.0
  # Ergaenzt: von calibration_store.dart benoetigt (ADR-020-Fix brachte
  # diese Datei von master herueber, siehe docs/archive/umbauplan/STATUS_FORTSCHRITT.md).
  # Version uebernommen von origin/master's pubspec.yaml.
  flutter_secure_storage: ^9.2.2
  # CSV-Aufnahmefunktion (Dokument 07/08, Session Claude-9936160f 2026-07-15):
  # Teilen-Button fuer aufgenommene CSVs. Aktuelle Major-Version (12.x) hat
  # eine neue API (SharePlus.instance.share(ShareParams(...)) statt des
  # alten statischen Share.shareXFiles(...)) - siehe csv_session_recorder.dart.
  share_plus: ^12.0.1
  # Phase 4: Riverpod State Management (SPEC TEIL 6, §6.1)
  flutter_riverpod: ^2.5.1
  # Phase 5 Vorbereitung: Haptic/Audio Feedback
  vibration: ^2.0.0
  audioplayers: ^6.1.0
  flutter_foreground_task: ^10.0.0
  camera: ^0.12.0+2
  flutter_pose_detection: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  drift_dev: ^2.32.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/flowrep_icon.png"
  adaptive_icon_background: "#6A1B9A"
  adaptive_icon_foreground: "assets/icon/flowrep_foreground.png"

flutter_native_splash:
  color: "#6A1B9A"
  image: "assets/icon/flowrep_splash.png"
  android: true
  ios: true
